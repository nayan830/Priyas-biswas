<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0a0005"/>
<title id="site-title">Priyas Biswas — Web Architect 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
/* (All CSS remains exactly as in the original – unchanged) */
:root{ --red:#8b0f2e;--pink:#ff3b6b;--cyan:#6cf5ff; --bg:#0a0005;--card:rgba(139,15,46,.12); --txt:#fff;--muted:rgba(255,255,255,.55); --gr:0 0 18px rgba(255,59,107,.6),0 0 50px rgba(255,59,107,.18); --gc:0 0 18px rgba(108,245,255,.6),0 0 50px rgba(108,245,255,.18); --fh:'Orbitron',monospace;--fb:'Rajdhani',sans-serif;--fm:'Share Tech Mono',monospace; --nav:70px; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--txt);font-family:var(--fb);font-size:16px;line-height:1.6;overflow-x:hidden}
@media(pointer:fine){ body{cursor:none} .c-dot,.c-ring{display:block} }
.c-dot{display:none;width:6px;height:6px;background:var(--cyan);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:var(--gc)}
.c-ring{display:none;width:36px;height:36px;border:1.5px solid var(--pink);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s;box-shadow:var(--gr)}
.c-ring.h{width:52px;height:52px;border-color:var(--cyan)}
body::before{content:'';position:fixed;inset:0;z-index:900;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none}
.bg-l{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 30%,rgba(139,15,46,.35) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 70%,rgba(80,5,20,.4) 0%,transparent 60%),linear-gradient(160deg,#0a0005,#12000a 40%,#0d0008)}
.bg-g{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(108,245,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(108,245,255,.035) 1px,transparent 1px);background-size:60px 60px;animation:gS 20s linear infinite;will-change:background-position}
@keyframes gS{to{background-position:60px 60px}}
.ptf{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.pt{position:absolute;width:2px;height:2px;background:var(--cyan);border-radius:50%;animation:ptU linear infinite;opacity:0}
@keyframes ptU{0%{transform:translateY(100vh);opacity:0}10%{opacity:.6}90%{opacity:.25}100%{transform:translateY(-10vh) translateX(20px);opacity:0}}
.wrap{max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,48px);position:relative;z-index:2}
section{padding:clamp(60px,10vw,110px) 0;position:relative}
.lbl{font-family:var(--fm);font-size:10px;color:var(--cyan);letter-spacing:4px;text-transform:uppercase;margin-bottom:10px;opacity:.8}
.stitle{font-family:var(--fh);font-size:clamp(26px,5vw,50px);font-weight:700;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,#fff 30%,var(--pink) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:clamp(32px,5vw,56px);line-height:1.1}
.nline{width:70px;height:2px;background:linear-gradient(90deg,var(--pink),var(--cyan));margin-bottom:14px;box-shadow:var(--gr)}
nav{position:fixed;top:0;left:0;right:0;z-index:600;height:var(--nav);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,4vw,40px);background:rgba(8,0,4,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,59,107,.14);transition:border-color .3s}
.logo{font-family:var(--fh);font-size:clamp(16px,4vw,22px);font-weight:900;letter-spacing:5px;color:#fff;text-decoration:none}
.nmenu{display:flex;gap:clamp(16px,3vw,32px);list-style:none;align-items:center}
.nmenu a{font-family:var(--fb);font-weight:600;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s;white-space:nowrap}
.nmenu a:hover{color:var(--cyan)}
.nmenu .wa-link{color:#25d366;display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid rgba(37,211,102,.3);border-radius:4px;transition:all .3s}
.nmenu .wa-link:hover{background:rgba(37,211,102,.1);box-shadow:0 0 16px rgba(37,211,102,.3);color:#25d366}
.ham{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px;z-index:700}
.ham span{display:block;width:24px;height:2px;background:var(--pink);border-radius:2px;transition:all .3s;box-shadow:var(--gr)}
.ham.x span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.ham.x span:nth-child(2){opacity:0;transform:scaleX(0)}
.ham.x span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mob-menu{position:fixed;top:var(--nav);left:0;right:0;background:rgba(8,0,4,.97);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,59,107,.15);padding:20px clamp(16px,4vw,32px) 28px;flex-direction:column;gap:0;display:none;z-index:580}
.mob-menu.open{display:flex;animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.mob-menu a{font-family:var(--fb);font-weight:600;font-size:15px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:14px 0;border-bottom:1px solid rgba(255,59,107,.07);transition:color .2s;display:flex;align-items:center;gap:10px}
.mob-menu a:hover{color:var(--cyan)}
.mob-menu a:last-child{border-bottom:none}
.mob-menu .wa-mob{color:#25d366}
#hero{min-height:100svh;min-height:100vh;display:flex;align-items:center;padding-top:calc(var(--nav) + 20px)}
.hi{display:grid;grid-template-columns:1fr 1fr;gap:clamp(32px,6vw,80px);align-items:center}
.htag{font-family:var(--fm);font-size:11px;color:var(--cyan);letter-spacing:3px;margin-bottom:18px;animation:fu .8s ease .2s both}
.hname{font-family:var(--fh);font-size:clamp(38px,6vw,72px);font-weight:900;letter-spacing:3px;line-height:1.05;text-transform:uppercase;margin-bottom:10px;animation:fu .8s ease .4s both}
.hname .l1{display:block;color:#fff}
.hname .l2{display:block;background:linear-gradient(90deg,var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hrole{font-family:var(--fh);font-size:clamp(10px,2vw,13px);letter-spacing:6px;color:var(--pink);text-transform:uppercase;margin-bottom:24px;animation:fu .8s ease .5s both}
.hdesc{font-size:clamp(14px,2.5vw,17px);color:var(--muted);line-height:1.8;margin-bottom:36px;animation:fu .8s ease .6s both}
.hdesc span{color:var(--cyan)}
.hbtns{display:flex;gap:14px;flex-wrap:wrap;animation:fu .8s ease .7s both}
.btn{font-family:var(--fh);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:13px clamp(18px,3vw,28px);border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px;transition:all .3s;font-weight:600;white-space:nowrap}
.bp{background:linear-gradient(135deg,var(--pink),var(--red));color:#fff;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
.bp:hover{transform:translateY(-2px);box-shadow:var(--gr)}
.bo{background:transparent;color:var(--cyan);border:1px solid var(--cyan);clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
.bo:hover{background:rgba(108,245,255,.08);transform:translateY(-2px);box-shadow:var(--gc)}
.hstat{display:flex;gap:14px;flex-wrap:wrap;margin-top:28px;animation:fu .8s ease .85s both}
.sb{display:flex;align-items:center;gap:7px;font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:1px}
.sd{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:var(--gc);animation:pulse 2s ease-in-out infinite;flex-shrink:0}
.sd.r{background:var(--pink);box-shadow:var(--gr);animation-delay:.5s}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.hiw{display:flex;justify-content:center;align-items:center;animation:fr 1s ease .5s both}
.hport{width:clamp(220px,35vw,300px);height:clamp(260px,42vw,360px);position:relative}
.pring{position:absolute;top:-18px;left:-18px;right:-18px;bottom:-18px;border:1px solid rgba(255,59,107,.14);border-radius:8px;animation:rr 8s linear infinite;will-change:transform}
.pring::after{content:'';position:absolute;top:-3px;left:50%;width:6px;height:6px;background:var(--pink);border-radius:50%;box-shadow:var(--gr);transform:translateX(-50%)}
@keyframes rr{to{transform:rotate(360deg)}}
.pframe{width:100%;height:100%;background:rgba(139,15,46,.1);border:1px solid rgba(255,59,107,.28);clip-path:polygon(0 0,calc(100% - 22px) 0,100% 22px,100% 100%,22px 100%,0 calc(100% - 22px));position:relative;overflow:hidden}
.pframe::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pink),var(--cyan));box-shadow:var(--gr);z-index:3}
.pcorner{position:absolute;width:18px;height:18px;border-color:var(--cyan);border-style:solid;box-shadow:var(--gc);z-index:3}
.pcorner.tl{top:8px;left:8px;border-width:2px 0 0 2px}
.pcorner.br{bottom:8px;right:8px;border-width:0 2px 2px 0}
/* Profile image container */
.profile-img-container{
  position:absolute;
  inset:0;
  z-index:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
.profile-img-container img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:top center;
  display:block;
}
.pframe::after{content:'';position:absolute;inset:0;z-index:2;background:linear-gradient(to bottom,rgba(139,15,46,.08) 0%,rgba(10,0,5,.15) 100%);pointer-events:none}
#projects{}
.proj-note{font-family:var(--fm);font-size:11px;color:var(--cyan);letter-spacing:1px;opacity:.75;margin-bottom:28px;padding:12px 18px;border:1px solid rgba(108,245,255,.15);background:rgba(108,245,255,.04);border-radius:2px;line-height:1.8;display:flex;align-items:flex-start;gap:10px}
.proj-note::before{content:'ℹ';font-size:14px;flex-shrink:0;margin-top:1px}
.proj-row{display:flex;align-items:stretch;gap:10px;background:rgba(139,15,46,.07);border:1px solid rgba(255,59,107,.2);padding:18px 20px;margin-bottom:44px;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));position:relative;flex-wrap:wrap}
.proj-row::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pink),var(--cyan));box-shadow:var(--gr)}
.proj-inp{background:rgba(0,0,0,.45);border:1px solid rgba(255,59,107,.22);color:#fff;font-family:var(--fb);font-size:15px;padding:12px 14px;outline:none;flex:1;min-width:140px;transition:border-color .3s,box-shadow .3s;clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));-webkit-appearance:none}
.proj-inp::placeholder{color:rgba(255,255,255,.2)}
.proj-inp:focus{border-color:var(--cyan);box-shadow:0 0 10px rgba(108,245,255,.12)}
.proj-inp.err{border-color:var(--pink);animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.btn-add{font-family:var(--fh);font-size:10px;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,var(--pink),var(--red));color:#fff;border:none;padding:0 22px;height:46px;cursor:pointer;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));transition:all .3s;white-space:nowrap;font-weight:700;display:inline-flex;align-items:center;gap:7px;align-self:flex-end}
.btn-add:hover,.btn-add:active{box-shadow:var(--gr);transform:translateY(-1px)}
.proj-list{display:flex;flex-direction:column;gap:clamp(20px,4vw,36px)}
.proj-card{background:rgba(10,0,8,.65);border:1px solid rgba(255,59,107,.18);backdrop-filter:blur(12px);clip-path:polygon(0 0,calc(100% - 18px) 0,100% 18px,100% 100%,18px 100%,0 calc(100% - 18px));overflow:hidden;animation:sin .4s ease both}
@keyframes sin{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.pch{display:flex;align-items:center;justify-content:space-between;padding:clamp(14px,3vw,20px) clamp(16px,3vw,28px);border-bottom:1px solid rgba(255,59,107,.1);flex-wrap:wrap;gap:10px}
.pcname{font-family:var(--fh);font-size:clamp(13px,3vw,16px);letter-spacing:2px;text-transform:uppercase;color:#fff;font-weight:700}
.pcmeta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pclink{font-family:var(--fm);font-size:10px;color:var(--cyan);text-decoration:none;letter-spacing:1px;display:inline-flex;align-items:center;gap:4px;border:1px solid rgba(108,245,255,.2);padding:5px 12px;clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px));transition:all .3s;white-space:nowrap}
.pclink::after{content:' ↗'}
.pclink:hover{background:rgba(108,245,255,.08);box-shadow:var(--gc)}
.btn-del{background:none;border:1px solid rgba(255,59,107,.2);color:rgba(255,59,107,.45);width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px));font-size:16px;line-height:1;transition:all .3s;flex-shrink:0}
.btn-del:hover{background:rgba(255,59,107,.1);color:var(--pink);box-shadow:var(--gr)}
.pcprev{position:relative;height:clamp(200px,40vw,420px);overflow:hidden;background:#050005}
.pbar{position:absolute;top:0;left:0;right:0;z-index:2;background:rgba(6,0,4,.97);border-bottom:1px solid rgba(255,59,107,.1);padding:7px 14px;display:flex;align-items:center;gap:9px}
.pdots{display:flex;gap:5px}
.pdot{width:9px;height:9px;border-radius:50%}
.pdot.r{background:rgba(255,80,80,.7)}
.pdot.y{background:rgba(255,200,50,.7)}
.pdot.g{background:rgba(50,220,80,.7)}
.purl{font-family:var(--fm);font-size:9px;color:rgba(255,255,255,.2);letter-spacing:1px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pfw{position:absolute;top:30px;left:0;right:0;bottom:0;overflow:hidden}
.pfw iframe{width:100%;height:100%;border:none;background:#fff;display:block}
.pblocked{position:absolute;top:30px;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(6,0,4,.97);text-align:center;padding:28px}
.pblocked-icon{font-size:38px;opacity:.18}
.pblocked-txt{font-family:var(--fm);font-size:10px;color:rgba(255,255,255,.22);letter-spacing:2px;line-height:2}
.popen{font-family:var(--fh);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(108,245,255,.3);background:none;padding:10px 22px;cursor:pointer;text-decoration:none;clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));transition:all .3s;display:inline-flex;align-items:center;gap:7px}
.popen:hover{background:rgba(108,245,255,.08);box-shadow:var(--gc)}
.pempty{text-align:center;padding:clamp(40px,8vw,80px) clamp(20px,4vw,40px);border:1px dashed rgba(255,59,107,.1)}
.pempty-icon{font-size:40px;opacity:.12;margin-bottom:16px}
.pempty-txt{font-family:var(--fm);font-size:11px;color:rgba(255,255,255,.16);letter-spacing:3px;line-height:2}
#journey{background:rgba(139,15,46,.04)}
.tl{position:relative;padding-left:56px;display:flex;flex-direction:column}
.tl::before{content:'';position:absolute;left:14px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--pink),var(--cyan));box-shadow:0 0 10px rgba(255,59,107,.35)}
.tli{position:relative;padding:26px 0;border-bottom:1px solid rgba(255,59,107,.07);transition:all .3s}
.tli:last-child{border-bottom:none}
.tli:hover .tlc{transform:translateX(6px)}
.tln{position:absolute;left:-48px;top:32px;width:15px;height:15px;border-radius:50%;background:var(--pink);border:3px solid var(--bg);box-shadow:var(--gr);z-index:1}
.tln.a{background:var(--cyan);box-shadow:var(--gc);animation:np 2s ease-in-out infinite}
@keyframes np{0%,100%{box-shadow:var(--gc),0 0 0 0 rgba(108,245,255,.35)}50%{box-shadow:var(--gc),0 0 0 7px rgba(108,245,255,0)}}
.tly{font-family:var(--fh);font-size:12px;letter-spacing:4px;color:var(--pink);margin-bottom:6px}
.tlc{transition:transform .3s}
.tle{font-size:clamp(15px,3vw,18px);font-weight:600;color:#fff;letter-spacing:1px}
.tlb{display:inline-block;margin-top:8px;height:2px;background:linear-gradient(90deg,var(--pink),transparent);border-radius:2px}
.tli:nth-child(1) .tlb{width:100px}
.tli:nth-child(2) .tlb{width:150px}
.tli:nth-child(3) .tlb{width:200px}
.tli:nth-child(4) .tlb{width:260px;background:linear-gradient(90deg,var(--cyan),transparent)}
#core-stack{text-align:center}
.sbadges{display:flex;justify-content:center;gap:clamp(24px,5vw,40px);flex-wrap:wrap}
.sbadge{position:relative;width:clamp(100px,18vw,130px);height:clamp(100px,18vw,130px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:all .3s}
.sbadge:hover{transform:translateY(-6px)}
.sbring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--pink);box-shadow:inset 0 0 18px rgba(255,59,107,.1),var(--gr);transition:all .3s}
.sbadge:hover .sbring{border-color:var(--cyan);box-shadow:inset 0 0 28px rgba(108,245,255,.15),var(--gc)}
.sbinner{width:72px;height:72px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,59,107,.2);backdrop-filter:blur(8px);z-index:1}
.sbsub{font-family:var(--fh);font-size:clamp(14px,3vw,18px);font-weight:700;letter-spacing:2px;color:#fff;z-index:1}
#skills{background:rgba(139,15,46,.04)}
.skwrap{display:grid;grid-template-columns:1fr 1fr;gap:clamp(20px,4vw,36px)}
.skih{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sknm{font-family:var(--fh);font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#fff;font-weight:600}
.skpct{font-family:var(--fm);font-size:12px;color:var(--cyan)}
.skbg{width:100%;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:visible;position:relative;margin-bottom:clamp(12px,3vw,20px)}
.skfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--pink),var(--cyan));box-shadow:var(--gr);position:relative;transform:scaleX(0);transform-origin:left;transition:transform 1.2s cubic-bezier(.16,1,.3,1)}
.skfill.on{transform:scaleX(1)}
.skfill::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:var(--gc)}
#cta{text-align:center;padding:clamp(70px,12vw,120px) 0}
.ctai{max-width:680px;margin:0 auto;position:relative}
.ctaglow{position:absolute;inset:-40px;background:radial-gradient(ellipse 60% 40% at 50% 50%,rgba(255,59,107,.07) 0%,transparent 70%);pointer-events:none}
.ctatitle{font-family:var(--fh);font-size:clamp(26px,5vw,52px);font-weight:900;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;line-height:1.1}
.ctatitle span{background:linear-gradient(90deg,var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ctasub{font-size:clamp(14px,2.5vw,17px);color:var(--muted);margin-bottom:36px;line-height:1.7}
.cta-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
#pw{position:fixed;inset:0;z-index:1200;background:rgba(4,0,7,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;padding:20px}
#pw.on{opacity:1;pointer-events:all}
.pwbox{width:100%;max-width:390px;background:rgba(12,0,9,.97);border:1px solid rgba(255,59,107,.3);clip-path:polygon(0 0,calc(100% - 22px) 0,100% 22px,100% 100%,22px 100%,0 calc(100% - 22px));padding:clamp(28px,5vw,40px) clamp(20px,5vw,36px) clamp(24px,4vw,34px);position:relative;animation:pop .32s cubic-bezier(.16,1,.3,1) both}
@keyframes pop{from{transform:scale(.9) translateY(16px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.pwbox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pink),var(--cyan));box-shadow:var(--gr)}
.pwicon{width:48px;height:48px;border:1px solid rgba(255,59,107,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;background:rgba(139,15,46,.15)}
.pwtit{font-family:var(--fh);font-size:16px;letter-spacing:4px;text-transform:uppercase;color:#fff;margin-bottom:5px;font-weight:700}
.pwsub{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:22px;line-height:1.9}
.pwfw{position:relative;margin-bottom:12px}
.pwinp{width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(255,59,107,.25);color:#fff;font-family:var(--fm);font-size:15px;letter-spacing:3px;padding:13px 46px 13px 16px;outline:none;transition:border-color .3s,box-shadow .3s;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,9px 100%,0 calc(100% - 9px));-webkit-appearance:none}
.pwinp::placeholder{letter-spacing:1px;color:rgba(255,255,255,.18);font-size:12px}
.pwinp:focus{border-color:var(--cyan);box-shadow:0 0 14px rgba(108,245,255,.1)}
.pwinp.err{border-color:var(--pink);animation:shake .4s ease}
.pweye{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.28);cursor:pointer;padding:4px;transition:color .2s}
.pweye:hover{color:var(--cyan)}
.pwerr{font-family:var(--fm);font-size:10px;color:var(--pink);letter-spacing:2px;margin-bottom:14px;min-height:16px;display:flex;align-items:center;gap:5px;opacity:0;transition:opacity .3s}
.pwerr.on{opacity:1}
.pwbtns{display:flex;gap:10px}
.pwok{flex:1;font-family:var(--fh);font-size:10px;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(135deg,var(--pink),var(--red));color:#fff;border:none;padding:13px;cursor:pointer;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,9px 100%,0 calc(100% - 9px));transition:all .3s;font-weight:700}
.pwok:hover{box-shadow:var(--gr);transform:translateY(-1px)}
.pwcancel{font-family:var(--fh);font-size:10px;letter-spacing:2px;text-transform:uppercase;background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.1);padding:13px 16px;cursor:pointer;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,9px 100%,0 calc(100% - 9px));transition:all .3s}
.pwcancel:hover{color:#fff;border-color:rgba(255,255,255,.28)}
footer{position:relative;z-index:2;border-top:1px solid rgba(255,59,107,.1);padding:clamp(20px,4vw,36px) clamp(16px,4vw,40px);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.fcopy{font-family:var(--fm);font-size:10px;color:rgba(255,255,255,.22);letter-spacing:2px}
.flogo{font-family:var(--fh);font-size:13px;font-weight:900;letter-spacing:5px;background:linear-gradient(90deg,var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.flinks{display:flex;gap:20px}
.flinks a{font-family:var(--fm);font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.22);text-decoration:none;transition:color .3s}
.flinks a:hover{color:var(--cyan)}
@keyframes fu{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fr{from{opacity:0;transform:translateX(36px)}to{opacity:1;transform:translateX(0)}}
.rev{opacity:0;transform:translateY(36px);transition:opacity .7s ease,transform .7s ease}
.rev.on{opacity:1;transform:translateY(0)}
@media(max-width:768px){
  .ham{display:flex}
  .nmenu{display:none}
  .hi{grid-template-columns:1fr;gap:32px;padding-bottom:24px}
  .hiw{order:-1}
  .hport{width:clamp(180px,55vw,240px);height:clamp(215px,65vw,285px)}
  .proj-row{flex-direction:column}
  .proj-inp{width:100%;min-width:unset}
  .btn-add{width:100%;height:48px;justify-content:center}
  .skwrap{grid-template-columns:1fr}
  .tl{padding-left:44px}
  .tln{left:-37px}
  .btn,.btn-add,.pwok,.pwcancel,.bp,.bo{min-height:44px}
  body::before{background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 6px)}
  .ptf{display:none}
}
@media(max-width:480px){
  .hname{font-size:clamp(32px,9vw,46px)}
  .flinks{gap:12px}
  .hstat{gap:10px}
  .pcprev{height:200px}
  .pbar{padding:6px 10px}
}
</style>
</head>
<body>

<div class="bg-l"></div>
<div class="bg-g"></div>
<div class="ptf" id="ptf"></div>
<div class="c-dot" id="cDot"></div>
<div class="c-ring" id="cRing"></div>

<!-- PASSWORD MODAL (content populated from JSON) -->
<div id="pw" role="dialog" aria-modal="true" aria-labelledby="pwtit">
  <div class="pwbox">
    <div class="pwicon">
      <svg width="22" height="22" fill="none" stroke="#ff3b6b" stroke-width="1.5" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="pwtit" id="pwtit">Admin Access</div>
    <div class="pwsub" id="pwsub">ENTER PASSWORD TO ADD PROJECT<br>VISITORS VIEW ONLY · ONLY ADMIN CAN ADD</div>
    <div class="pwfw">
      <input class="pwinp" id="pwInp" type="password" placeholder="Enter password" autocomplete="off"/>
      <button class="pweye" id="pwEye" tabindex="-1" aria-label="Show/hide password">
        <svg id="eyeSvg" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <div class="pwerr" id="pwErr">
      <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="pwErrMsg">INCORRECT PASSWORD — ACCESS DENIED</span>
    </div>
    <div class="pwbtns">
      <button class="pwok" id="pwOk"><span id="pwOkText">Unlock &amp; Add</span></button>
      <button class="pwcancel" id="pwCancel"><span id="pwCancelText">Cancel</span></button>
    </div>
  </div>
</div>

<!-- NAV -->
<nav id="mainNav">
  <a href="#hero" class="logo" id="logo" aria-label="Priyas Biswas home">PRIYAS</a>
  <!-- Desktop menu (dynamic) -->
  <ul class="nmenu" id="desktop-menu" role="list"></ul>
  <!-- Hamburger -->
  <button class="ham" id="ham" aria-label="Toggle menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- Mobile Drawer (dynamic) -->
<nav class="mob-menu" id="mobMenu" aria-label="Mobile navigation"></nav>

<!-- HERO -->
<section id="hero">
  <div class="wrap">
    <div class="hi">
      <!-- TEXT -->
      <div>
        <div class="htag" id="hero-tag"></div>
        <h1 class="hname"><span class="l1" id="hero-first"></span><span class="l2" id="hero-last"></span></h1>
        <div class="hrole" id="hero-role"></div>
        <p class="hdesc" id="hero-desc"></p>
        <div class="hbtns" id="hero-btns"></div>
        <div class="hstat" id="hero-stats"></div>
      </div>
      <!-- PORTRAIT with dynamic image -->
      <div class="hiw">
        <div class="hport">
          <div class="pring"></div>
          <div class="pframe">
            <div class="pcorner tl"></div>
            <div class="pcorner br"></div>
            <!-- Profile image container (replaces old SVG) -->
            <div class="profile-img-container" id="profile-image-container">
              <img id="profile-img" src="" alt="Profile" style="opacity:0.5; width:100%; height:100%; object-fit:cover; object-position:top center;">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects">
  <div class="wrap">
    <div class="lbl">01 / DEPLOYMENTS</div>
    <div class="nline"></div>
    <h2 class="stitle">Projects</h2>
    <div class="proj-note rev" id="projects-note"></div>
    <div class="proj-row rev">
      <input class="proj-inp" id="pName" type="text" placeholder="" autocomplete="off"/>
      <input class="proj-inp" id="pUrl" type="url" placeholder=""/>
      <button class="btn-add" id="btnAdd">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span id="addButtonText">Add Project</span>
      </button>
    </div>
    <div class="proj-list rev" id="projList"></div>
  </div>
</section>

<!-- JOURNEY -->
<section id="journey">
  <div class="wrap">
    <div class="lbl">02 / ORIGIN STORY</div>
    <div class="nline"></div>
    <h2 class="stitle">Journey</h2>
    <div class="tl rev" id="timeline"></div>
  </div>
</section>

<!-- CORE STACK -->
<section id="core-stack">
  <div class="wrap" style="text-align:center">
    <div class="lbl">03 / TOOLS OF TRADE</div>
    <div class="nline" style="margin:0 auto 14px"></div>
    <h2 class="stitle" style="text-align:center">Core Stack</h2>
    <div class="sbadges rev" id="core-stack-items"></div>
  </div>
</section>

<!-- SKILLS -->
<section id="skills">
  <div class="wrap">
    <div class="lbl">04 / CAPABILITIES</div>
    <div class="nline"></div>
    <h2 class="stitle">Skills Matrix</h2>
    <div class="skwrap rev" id="skills-container"></div>
  </div>
</section>

<!-- CTA -->
<section id="cta">
  <div class="wrap">
    <div class="ctai rev">
      <div class="ctaglow"></div>
      <div class="lbl" style="justify-content:center;display:flex" id="cta-pre"></div>
      <div class="nline" style="margin:12px auto 28px"></div>
      <h2 class="ctatitle" id="cta-title"></h2>
      <p class="ctasub" id="cta-sub"></p>
      <div class="cta-btns" id="cta-buttons"></div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="fcopy" id="footer-copy"></div>
  <div class="flogo" id="footer-logo"></div>
  <div class="flinks" id="footer-links"></div>
</footer>

<script>
// ---- Load data from JSON and populate page ----
async function loadContent() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error('Failed to fetch data.json');
    const data = await res.json();
    const site = data.site;

    // Helper to set text or HTML
    const setText = (id, text) => { const el = document.getElementById(id); if (el) el.innerHTML = text; };
    const setAttr = (id, attr, value) => { const el = document.getElementById(id); if (el) el.setAttribute(attr, value); };

    // Page title
    document.title = site.title;

    // Nav
    setText('logo', site.nav.logo);
    const desktopMenu = document.getElementById('desktop-menu');
    const mobMenu = document.getElementById('mobMenu');
    if (desktopMenu) {
      desktopMenu.innerHTML = site.nav.menu.map(item => `<li><a href="${item.href}">${item.label}</a></li>`).join('');
      // Add WhatsApp link
      const waLi = document.createElement('li');
      waLi.innerHTML = `<a href="${site.nav.whatsapp.url}" target="_blank" rel="noopener" class="wa-link" aria-label="Chat on WhatsApp">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        ${site.nav.whatsapp.label}
      </a>`;
      desktopMenu.appendChild(waLi);
    }
    // Mobile menu
    if (mobMenu) {
      mobMenu.innerHTML = site.nav.menu.map(item => `<a href="${item.href}" class="mob-item">${item.label}</a>`).join('');
      const waMob = document.createElement('a');
      waMob.href = site.nav.whatsapp.url;
      waMob.target = '_blank';
      waMob.rel = 'noopener';
      waMob.className = 'mob-item wa-mob';
      waMob.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg> WhatsApp — ${site.nav.whatsapp.number}`;
      mobMenu.appendChild(waMob);
    }

    // Hero
    setText('hero-tag', site.hero.tag);
    setText('hero-first', site.hero.firstName);
    setText('hero-last', site.hero.lastName);
    setText('hero-role', site.hero.role);
    setText('hero-desc', site.hero.description);
    // Hero buttons
    const heroBtns = document.getElementById('hero-btns');
    if (heroBtns) {
      heroBtns.innerHTML = site.hero.buttons.map(btn => {
        const icon = btn.icon ? '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 5l7 7-7 7M5 5l7 7-7 7"/></svg>' : '';
        const idAttr = btn.id ? ` id="${btn.id}"` : '';
        return `<a href="${btn.href}" class="btn ${btn.class}"${idAttr}>${icon} ${btn.text}</a>`;
      }).join('');
    }
    // Hero stats
    const statsEl = document.getElementById('hero-stats');
    if (statsEl) {
      statsEl.innerHTML = site.hero.stats.map(stat => `<div class="sb"><div class="${stat.dotClass}"></div> ${stat.label}</div>`).join('');
    }

    // Profile image
    const profileImg = document.getElementById('profile-img');
    if (profileImg && site.profile && site.profile.image) {
      if (site.profile.image.src) {
        profileImg.src = site.profile.image.src;
        profileImg.style.opacity = site.profile.image.opacity || 0.5;
      } else {
        // Hide container if no image
        document.getElementById('profile-image-container').style.display = 'none';
      }
    }

    // Projects
    setText('projects-note', site.projects.note);
    setAttr('pName', 'placeholder', site.projects.inputPlaceholderName);
    setAttr('pUrl', 'placeholder', site.projects.inputPlaceholderUrl);
    setText('addButtonText', site.projects.addButtonText);
    // Store empty message for later use in renderAll
    const emptySpan = document.getElementById('projects-empty-message') || document.createElement('span');
    emptySpan.id = 'projects-empty-message';
    emptySpan.style.display = 'none';
    emptySpan.innerHTML = site.projects.emptyMessage;
    document.body.appendChild(emptySpan);

    // Journey
    const timeline = document.getElementById('timeline');
    if (timeline) {
      timeline.innerHTML = site.journey.items.map((item, idx) => `
        <div class="tli">
          <div class="tln ${idx === site.journey.items.length-1 ? 'a' : ''}"></div>
          <div class="tlc">
            <div class="tly">${item.year}</div>
            <div class="tle">${item.description}</div>
            <div class="tlb"></div>
          </div>
        </div>
      `).join('');
    }

    // Core stack (icons are static, we only set names)
    const stackEl = document.getElementById('core-stack-items');
    if (stackEl) {
      stackEl.innerHTML = site.coreStack.items.map(item => {
        let svg = '';
        if (item.icon === 'html') svg = '<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#ff3b6b" stroke-width="1.5"><path d="M4 3l1.5 17L12 22l6.5-2L20 3H4z"/><path d="M16 8H8l.3 3.5h7.4L15.3 16l-3.3 1-3.3-1-.2-2.5H6l.4 4.5L12 20l5.6-1.5L19 7H5"/></svg>';
        else if (item.icon === 'css') svg = '<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#ff3b6b" stroke-width="1.5"><path d="M4 3l1.5 17L12 22l6.5-2L20 3H4z"/><path d="M16 8H8l.3 3h7.2l-.5 5-3 1-3-1-.2-2.5H7l.4 4.5L12 20l4.8-1.5.7-8.5H8.3L8 8"/></svg>';
        else svg = '<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#ff3b6b" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 17.5v-3M16 14.5c0-1-.8-1.5-1.5-1.5S13 13.5 13 14.5s.5 1.2 1.5 1.5 1.5.8 1.5 1.5-.6 1.5-1.5 1.5S13 18.5 13 18"/></svg>';
        return `<div class="sbadge"><div class="sbring"></div><div class="sbinner">${svg}</div><div class="sbsub">${item.name}</div></div>`;
      }).join('');
    }

    // Skills
    const skillsCont = document.getElementById('skills-container');
    if (skillsCont) {
      skillsCont.innerHTML = site.skills.items.map(skill => `
        <div>
          <div class="skih"><span class="sknm">${skill.name}</span><span class="skpct">${skill.percentage}%</span></div>
          <div class="skbg"><div class="skfill" style="width:${skill.percentage}%"></div></div>
        </div>
      `).join('');
    }

    // CTA
    setText('cta-pre', site.cta.preTitle);
    setText('cta-title', site.cta.title);
    setText('cta-sub', site.cta.subtitle);
    const ctaBtns = document.getElementById('cta-buttons');
    if (ctaBtns) {
      ctaBtns.innerHTML = site.cta.buttons.map(btn => {
        const icon = btn.icon ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>' : '';
        return `<a href="${btn.href}" target="${btn.href.startsWith('http') ? '_blank' : '_self'}" rel="noopener" class="btn ${btn.class}">${icon} ${btn.text}</a>`;
      }).join('');
    }

    // Footer
    setText('footer-copy', site.footer.copyright);
    setText('footer-logo', site.footer.logo);
    const footerLinks = document.getElementById('footer-links');
    if (footerLinks) {
      footerLinks.innerHTML = site.footer.links.map(link => `<a href="${link.href}" target="_blank" rel="noopener">${link.label}</a>`).join('');
    }

    // Password modal
    setText('pwtit', site.passwordModal.title);
    setText('pwsub', site.passwordModal.subtitle);
    setAttr('pwInp', 'placeholder', site.passwordModal.placeholder);
    setText('pwOkText', site.passwordModal.unlockButton);
    setText('pwCancelText', site.passwordModal.cancelButton);
    setText('pwErrMsg', site.passwordModal.errorMessage);

    // Re-run cursor binding for new dynamic elements
    if (window._bh) window._bh();

  } catch (err) {
    console.error('Error loading content:', err);
    // Fallback: keep static content (already present)
  }
}

// Start loading
loadContent();

/* ── PARTICLES (desktop only) ── */
if(window.innerWidth>768){
  const ptf=document.getElementById('ptf');
  for(let i=0;i<28;i++){
    const p=document.createElement('div');p.className='pt';
    p.style.cssText=`left:${Math.random()*100}%;animation-duration:${7+Math.random()*11}s;animation-delay:${-Math.random()*14}s;width:${1+Math.random()*2.5}px;height:${1+Math.random()*2.5}px;opacity:${.15+Math.random()*.45}`;
    ptf.appendChild(p);
  }
}

/* ── CURSOR (desktop only) ── */
if(window.matchMedia('(pointer:fine)').matches){
  const cDot=document.getElementById('cDot'),cRing=document.getElementById('cRing');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY},{passive:true});
  (function a(){cDot.style.left=mx+'px';cDot.style.top=my+'px';rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cRing.style.left=rx+'px';cRing.style.top=ry+'px';requestAnimationFrame(a)})();
  function bh(){document.querySelectorAll('a,button,.btn-del,.popen').forEach(el=>{el.addEventListener('mouseenter',()=>cRing.classList.add('h'),{passive:true});el.addEventListener('mouseleave',()=>cRing.classList.remove('h'),{passive:true})})}
  bh();
  window._bh=bh;
}

/* ── HAMBURGER ── */
const ham=document.getElementById('ham');
const mobMenu=document.getElementById('mobMenu');
ham.addEventListener('click',()=>{
  const open=mobMenu.classList.toggle('open');
  ham.classList.toggle('x',open);
  ham.setAttribute('aria-expanded',open);
});
/* Close drawer on link tap */
mobMenu.querySelectorAll('a').forEach(a=>{
  a.addEventListener('click',()=>{
    mobMenu.classList.remove('open');
    ham.classList.remove('x');
    ham.setAttribute('aria-expanded','false');
  });
});

/* ── NAV SCROLL TINT ── */
const nav=document.getElementById('mainNav');
window.addEventListener('scroll',()=>{
  nav.style.borderBottomColor=window.scrollY>60?'rgba(255,59,107,.25)':'rgba(255,59,107,.14)';
},{passive:true});

/* ── SCROLL REVEAL ── */
const ro=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('on')}),{threshold:.12,rootMargin:'0px 0px -30px 0px'});
document.querySelectorAll('.rev').forEach(r=>ro.observe(r));

/* ── SKILL BARS ── */
const so=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.querySelectorAll('.skfill').forEach(b=>b.classList.add('on'));so.unobserve(e.target)}}),{threshold:.25});
const skw=document.getElementById('skills-container');if(skw)so.observe(skw);

/* ── SMOOTH SCROLL for Explore Projects ── */
document.getElementById('exploreBtn')?.addEventListener('click',e=>{
  e.preventDefault();
  const target=document.getElementById('projects');
  if(!target)return;
  const y=target.getBoundingClientRect().top+window.scrollY-parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav'));
  window.scrollTo({top:y,behavior:'smooth'});
});

/* ═══════════════════════════
   PASSWORD + PROJECT SYSTEM (unchanged)
═══════════════════════════ */
const H=s=>[...s].reduce((a,c)=>Math.imul(31,a)+c.charCodeAt(0)|0,0).toString(16);
const OK=H('PRIYAS@1000');

const pwEl    =document.getElementById('pw');
const pwInp   =document.getElementById('pwInp');
const pwOk    =document.getElementById('pwOk');
const pwCancel=document.getElementById('pwCancel');
const pwErr   =document.getElementById('pwErr');
const pwEye   =document.getElementById('pwEye');
const eyeSvg  =document.getElementById('eyeSvg');
const pName   =document.getElementById('pName');
const pUrl    =document.getElementById('pUrl');
const btnAdd  =document.getElementById('btnAdd');
const projList=document.getElementById('projList');

const EOPEN=`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
const ESHUT=`<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
let pendName='',pendUrl='';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function load(){try{return JSON.parse(localStorage.getItem('priyasb_v2')||'[]')}catch{return[]}}
function save(a){try{localStorage.setItem('priyasb_v2',JSON.stringify(a))}catch{}}

function openPw(n,u){
  pendName=n;pendUrl=u;
  pwInp.value='';pwInp.type='password';eyeSvg.innerHTML=EOPEN;
  pwErr.classList.remove('on');pwInp.classList.remove('err');
  pwEl.classList.add('on');
  setTimeout(()=>pwInp.focus(),200);
}
function closePw(){pwEl.classList.remove('on');pendName='';pendUrl=''}

function tryUnlock(){
  if(H(pwInp.value)===OK){
    closePw();commitAdd(pendName,pendUrl);
  } else {
    pwInp.classList.add('err');pwErr.classList.add('on');
    setTimeout(()=>pwInp.classList.remove('err'),500);
    pwInp.value='';pwInp.focus();
    pwOk.disabled=true;setTimeout(()=>{pwOk.disabled=false},1500);
  }
}

pwOk.addEventListener('click',tryUnlock);
pwInp.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock()});
pwCancel.addEventListener('click',closePw);
pwEl.addEventListener('click',e=>{if(e.target===pwEl)closePw()},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&pwEl.classList.contains('on'))closePw()});
pwEye.addEventListener('click',()=>{
  const s=pwInp.type==='password';
  pwInp.type=s?'text':'password';
  eyeSvg.innerHTML=s?ESHUT:EOPEN;
});

btnAdd.addEventListener('click',()=>{
  const n=pName.value.trim(),u=pUrl.value.trim();
  let ok=true;
  if(!n){pName.classList.add('err');setTimeout(()=>pName.classList.remove('err'),500);ok=false}
  if(!u){pUrl.classList.add('err');setTimeout(()=>pUrl.classList.remove('err'),500);ok=false}
  if(!ok)return;
  openPw(n,/^https?:\/\//i.test(u)?u:'https://'+u);
});

function commitAdd(name,url){
  const arr=load();arr.unshift({name,url,id:Date.now()});save(arr);
  pName.value='';pUrl.value='';renderAll();
}

function del(id){save(load().filter(p=>p.id!==id));renderAll()}

function buildCard(p,i){
  const card=document.createElement('div');
  card.className='proj-card';
  card.style.animationDelay=(i*.06)+'s';
  const disp=p.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
  card.innerHTML=`
    <div class="pch">
      <div class="pcname">${esc(p.name)}</div>
      <div class="pcmeta">
        <a class="pclink" href="${esc(p.url)}" target="_blank" rel="noopener">${esc(disp)}</a>
        <button class="btn-del" data-id="${p.id}" title="Remove project" aria-label="Remove ${esc(p.name)}">×</button>
      </div>
    </div>
    <div class="pcprev">
      <div class="pbar">
        <div class="pdots"><div class="pdot r"></div><div class="pdot y"></div><div class="pdot g"></div></div>
        <div class="purl">${esc(p.url)}</div>
      </div>
      <div class="pfw" id="fw${p.id}">
        <iframe src="${esc(p.url)}" sandbox="allow-scripts allow-same-origin allow-forms" loading="lazy" title="Preview of ${esc(p.name)}" id="ifr${p.id}"></iframe>
      </div>
    </div>`;

  setTimeout(()=>{
    const ifr=card.querySelector('#ifr'+p.id);
    const fw=card.querySelector('#fw'+p.id);
    if(!ifr||!fw)return;
    const t=setTimeout(()=>{
      try{const d=ifr.contentDocument||ifr.contentWindow.document;if(!d||d.body.innerHTML==='')showBlocked(fw,p.url,p.name)}
      catch{/* cross-origin = likely loaded */}
    },6000);
    ifr.onload=()=>clearTimeout(t);
    ifr.onerror=()=>{clearTimeout(t);showBlocked(fw,p.url,p.name)};
  },80);

  card.querySelector('.btn-del').addEventListener('click',e=>{
    if(confirm('Remove "'+p.name+'" from projects?'))del(parseInt(e.currentTarget.dataset.id));
  });
  return card;
}

function showBlocked(fw,url,name){
  fw.innerHTML=`
    <div class="pblocked">
      <div class="pblocked-icon">🔒</div>
      <div class="pblocked-txt">PREVIEW UNAVAILABLE<br>This site blocks iframe embedding<br>but the link is live and working.</div>
      <a class="popen" href="${esc(url)}" target="_blank" rel="noopener">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open ${esc(name)}
      </a>
    </div>`;
  if(window._bh)window._bh();
}

function renderAll(){
  const arr=load();projList.innerHTML='';
  if(arr.length===0){
    const emptyMsg = document.getElementById('projects-empty-message')?.innerHTML || 'NO PROJECTS YET<br>ENTER NAME + LINK ABOVE<br>AND CLICK ADD PROJECT';
    projList.innerHTML=`
      <div class="pempty">
        <div class="pempty-icon">🚀</div>
        <div class="pempty-txt">${emptyMsg}</div>
      </div>`;
    return;
  }
  arr.forEach((p,i)=>projList.appendChild(buildCard(p,i)));
  if(window._bh)window._bh();
}

renderAll();
</script>
</body>
</html>
